<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帝王系统 · 朝堂会话室</title>
<style>
  :root {
    --bg: #0f1419; --surface: #1a2332; --border: #2d3748;
    --text: #e2e8f0; --text-muted: #718096; --accent: #c9a84c;
    --green: #48bb78; --red: #fc8181; --blue: #63b3ed; --orange: #ed8936;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* 顶栏 */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-title { font-size: 18px; font-weight: bold; color: var(--accent); }
  .topbar-status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; }
  .status-dot.connected { background: var(--green); animation: pulse 2s infinite; }
  .status-dot.disconnected { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* 主容器 */
  .container { display: flex; flex: 1; overflow: hidden; }

  /* 侧边栏 */
  .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; color: var(--accent); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
  .agent-item { padding: 10px 12px; border-radius: 8px; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; transition: background 0.2s; }
  .agent-item:hover { background: rgba(201,168,76,0.1); }
  .agent-item.online { color: var(--text); }
  .agent-item.offline { color: var(--text-muted); opacity: 0.5; }
  .agent-emoji { font-size: 16px; }
  .agent-name { flex: 1; }
  .agent-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: rgba(72,187,120,0.2); color: var(--green); }

  /* 聊天区 */
  .chat { flex: 1; display: flex; flex-direction: column; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .message { display: flex; gap: 12px; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .message.system { justify-content: center; }
  .message.system .msg-content { background: rgba(99,179,237,0.1); color: var(--blue); padding: 6px 12px; border-radius: 12px; font-size: 12px; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .msg-body { flex: 1; }
  .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .msg-sender { font-weight: 600; font-size: 14px; color: var(--accent); }
  .msg-to { font-size: 12px; color: var(--text-muted); }
  .msg-time { font-size: 11px; color: var(--text-muted); margin-left: auto; }
  .msg-content { background: var(--surface); padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
  .msg-type { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 6px; }
  .msg-type.edict { background: rgba(237,137,54,0.2); color: var(--orange); }
  .msg-type.request { background: rgba(99,179,237,0.2); color: var(--blue); }
  .msg-type.reply { background: rgba(72,187,120,0.2); color: var(--green); }
  .msg-type.reject { background: rgba(252,129,129,0.2); color: var(--red); }

  /* 输入区 */
  .input-area { border-top: 1px solid var(--border); padding: 16px 20px; background: var(--surface); }
  .input-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .input-select { padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }
  .input-select:focus { border-color: var(--accent); }
  .input-box { display: flex; gap: 8px; }
  .input-field { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; resize: none; font-family: inherit; }
  .input-field:focus { border-color: var(--accent); }
  .btn-send { padding: 10px 24px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-send:hover { background: #d4b35a; }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <div class="topbar-title">🏛️ 朝堂会话室</div>
  <div class="topbar-status">
    <span class="status-dot disconnected" id="statusDot"></span>
    <span id="statusText">未连接</span>
    <a href="/" style="color:var(--text-muted);text-decoration:none;margin-left:16px">← 返回看板</a>
  </div>
</div>

<!-- 主容器 -->
<div class="container">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-header">👥 在线官员 (<span id="onlineCount">0</span>)</div>
    <div class="sidebar-list" id="agentList">
      <div style="color:var(--text-muted);font-size:12px;padding:20px;text-align:center">等待连接...</div>
    </div>
  </div>

  <!-- 聊天区 -->
  <div class="chat">
    <div class="messages" id="messages">
      <div class="message system">
        <div class="msg-content">欢迎进入朝堂会话室</div>
      </div>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <div class="input-row">
        <select class="input-select" id="toAgent" style="width:200px">
          <option value="">发送给全体</option>
          <option value="zhongshuling">中书令</option>
          <option value="zhongshu_sheren">中书舍人</option>
          <option value="shizhong">侍中侍郎</option>
          <option value="jishizhong">给事中</option>
          <option value="shangshuling">尚书令</option>
          <option value="libu">吏部</option>
          <option value="hubu">户部</option>
          <option value="libu_protocol">礼部</option>
          <option value="bingbu">兵部</option>
          <option value="xingbu">刑部</option>
          <option value="gongbu">工部</option>
        </select>
        <select class="input-select" id="msgType" style="width:120px">
          <option value="edict">敕令</option>
          <option value="request">请求</option>
          <option value="reply">回复</option>
        </select>
        <input type="text" class="input-select" id="taskId" placeholder="任务ID (可选)" style="flex:1">
      </div>
      <div class="input-box">
        <textarea class="input-field" id="messageInput" rows="2" placeholder="输入旨意内容..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
        <button class="btn-send" onclick="sendMessage()" id="btnSend" disabled>下旨</button>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = 'ws://127.0.0.1:7893';
let ws = null;
let reconnectTimer = null;

const AGENT_EMOJI = {
  emperor: '👑', zhongshuling: '📜', zhongshu_sheren: '📝',
  shizhong: '⚖️', jishizhong: '🔍', shangshuling: '📋',
  libu: '👥', hubu: '💰', libu_protocol: '📖', bingbu: '⚔️',
  xingbu: '⚖️', gongbu: '🏗️', jiangzuo: '🏛️', shaofu: '🎨',
  junqi: '🛡️', dushui: '🌊', sinong: '🌾',
};

function connect() {
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const btnSend = document.getElementById('btnSend');

  statusDot.className = 'status-dot disconnected';
  statusText.textContent = '连接中...';

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    statusDot.className = 'status-dot connected';
    statusText.textContent = '已连接';
    btnSend.disabled = false;
    clearTimeout(reconnectTimer);

    // 注册为 Web 客户端
    ws.send(JSON.stringify({
      type: 'register',
      agent_id: 'emperor',
      type: 'web',
    }));

    addSystemMessage('✅ 已连接到朝堂');
  };

  ws.onmessage = (event) => {
    try {
      const data = JSON.parse(event.data);
      handleMessage(data);
    } catch (e) {
      console.error('解析消息失败:', e);
    }
  };

  ws.onclose = () => {
    statusDot.className = 'status-dot disconnected';
    statusText.textContent = '已断开';
    btnSend.disabled = true;
    addSystemMessage('❌ 连接断开，5秒后重连...');
    reconnectTimer = setTimeout(connect, 5000);
  };

  ws.onerror = (error) => {
    console.error('WebSocket 错误:', error);
  };
}

function handleMessage(data) {
  const type = data.type;

  if (type === 'message') {
    addMessage(data);
  } else if (type === 'system') {
    addSystemMessage(data.content);
  } else if (type === 'online') {
    updateOnlineList(data.clients);
  }
}

function addMessage(data) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';

  const emoji = AGENT_EMOJI[data.from_agent] || '👤';
  const time = new Date(data.timestamp).toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});
  const typeLabel = data.msg_type_label || data.msg_type;
  const toText = data.to_agent === 'all' ? '全体' : data.to_name;

  div.innerHTML = `
    <div class="msg-avatar">${emoji}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-sender">${data.from_name}</span>
        <span class="msg-to">→ ${toText}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-content">
        <span class="msg-type ${data.msg_type}">${typeLabel}</span>
        ${escapeHtml(data.content)}
      </div>
    </div>
  `;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addSystemMessage(text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message system';
  div.innerHTML = `<div class="msg-content">${escapeHtml(text)}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function updateOnlineList(clients) {
  const list = document.getElementById('agentList');
  const count = document.getElementById('onlineCount');
  count.textContent = clients.length;

  list.innerHTML = clients.map(c => {
    const emoji = AGENT_EMOJI[c.agent_id] || '👤';
    const badge = c.type === 'agent' ? '<span class="agent-badge">Agent</span>' : '';
    return `
      <div class="agent-item online">
        <span class="agent-emoji">${emoji}</span>
        <span class="agent-name">${c.name}</span>
        ${badge}
      </div>
    `;
  }).join('');
}

function sendMessage() {
  const input = document.getElementById('messageInput');
  const toAgent = document.getElementById('toAgent').value;
  const msgType = document.getElementById('msgType').value;
  const taskId = document.getElementById('taskId').value || `COURT-${Date.now()}`;
  const content = input.value.trim();

  if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

  ws.send(JSON.stringify({
    type: 'message',
    to_agent: toAgent,
    msg_type: msgType,
    task_id: taskId,
    content: content,
  }));

  input.value = '';
  input.focus();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 初始化
connect();
</script>
</body>
</html>
